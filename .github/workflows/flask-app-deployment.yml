name: Build and push Docker image

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Nimmt automatisch den GitHub-Namen
          password: ${{ secrets.GITHUB_TOKEN }} # Automatisches Passwort von GitHub

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app # Dockerfile liegt im Unterorder app
          push: true
          tags: |
            ghcr.io/emoriiz/k8s-deployment-challenge:latest
            ghcr.io/emoriiz/k8s-deployment-challenge:${{ github.sha }}