name: Build and push Docker image

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Möglichkeit es auch für ARM zu emulieren
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Nimmt automatisch den GitHub-Namen
          password: ${{ secrets.GITHUB_TOKEN }} # Automatisches Passwort von GitHub

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app # Dockerfile liegt im Unterorder app
          push: true
          # Baut das Image für amd64 und arm64 Architektur
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/emoriiz/k8s-deployment-challenge:latest
            ghcr.io/emoriiz/k8s-deployment-challenge:${{ github.sha }}
        
      - name: Update image tag in values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" deployment/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push